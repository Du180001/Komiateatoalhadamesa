name: Executar Agendamento SICA

on:
  schedule:
    # 14:00 UTC = 11:00 Horário de Brasília
    # 1-5 representa de Segunda (1) a Sexta-feira (5)
    - cron: '0 9 * * 0,1,3'
  
  # Permite rodar manualmente a qualquer momento pela aba Actions do GitHub
  workflow_dispatch:

jobs:
  executar-script:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Executar script de envio
        run: python app.py
